<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Outfit:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-20px) rotate(2deg); }
      75% { transform: translateY(10px) rotate(-1deg); }
    }
    @keyframes glitch {
      0%, 100% { text-shadow: 2px 0 #dc3545, -2px 0 #0dcaf0; }
      25% { text-shadow: -2px -2px #dc3545, 2px 2px #0dcaf0; }
      50% { text-shadow: 2px 2px #ffc107, -2px -2px #673ab7; }
      75% { text-shadow: -2px 2px #dc3545, 2px -2px #0dcaf0; }
    }
    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) rotate(360deg); opacity: 0; }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes blink-caret {
      50% { border-color: transparent; }
    }
    @keyframes countdown-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes progress-fill {
      from { width: 100%; }
      to { width: 0%; }
    }
    @keyframes explosion-pop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }
    @keyframes explosion-burst {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--ex), var(--ey)) scale(0.3); opacity: 0; }
    }
    @keyframes flash-white {
      0%, 100% { background: transparent; }
      50% { background: rgba(255, 255, 255, 0.9); }
    }
    @keyframes shake-intense {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-8px, -8px) rotate(-2deg); }
      20% { transform: translate(8px, 6px) rotate(2deg); }
      30% { transform: translate(-6px, 8px) rotate(-1deg); }
      40% { transform: translate(7px, -7px) rotate(1deg); }
      50% { transform: translate(-7px, 7px) rotate(-2deg); }
      60% { transform: translate(6px, -6px) rotate(2deg); }
      70% { transform: translate(-8px, 5px) rotate(-1deg); }
      80% { transform: translate(8px, -8px) rotate(1deg); }
      90% { transform: translate(-5px, -5px) rotate(-2deg); }
    }
    .float-anim { animation: float 6s ease-in-out infinite; }
    .explosion-particle {
      position: fixed;
      pointer-events: none;
      animation: explosion-burst 0.8s ease-out forwards;
    }
    .flash-bg {
      animation: flash-white 0.4s ease-out;
    }
    .shake-on-zero {
      animation: shake-intense 0.6s ease-in-out;
    }
    .glitch-text { animation: glitch 0.3s ease-in-out infinite; }
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: drift 4s ease-in-out infinite;
    }
    .fade-in-up { animation: fade-in-up 0.8s ease-out forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }

    .astronaut-container { animation: float 5s ease-in-out infinite; }

    .countdown-num {
      animation: countdown-pulse 1s ease-in-out infinite;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    .home-btn {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .home-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(81, 45, 168, 0.4);
    }
    .home-btn:active {
      transform: scale(0.97);
      animation: shake 0.4s ease-in-out;
    }

    .fun-facts {
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid #673ab7;
      animation: typewriter 3s steps(50) 1.5s forwards, blink-caret 0.75s step-end infinite;
      width: 0;
      display: inline-block;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full overflow-auto" style="background: #212529; font-family: 'Outfit', sans-serif;">
  <div id="app-wrapper" class="h-full w-full relative flex flex-col items-center justify-center px-4 py-8" style="background: radial-gradient(ellipse at 30% 20%, rgba(81,45,168,0.25) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(103,58,183,0.15) 0%, transparent 50%), #212529;">
   <!-- Particles -->
   <div id="particles" class="absolute inset-0 pointer-events-none overflow-hidden"></div><!-- Main Content -->
   <div class="relative z-10 text-center max-w-2xl mx-auto">
    <!-- Floating Astronaut SVG -->
    <div class="astronaut-container mb-6 fade-in-up">
     <svg width="140" height="140" viewbox="0 0 140 140" fill="none" class="mx-auto">
      <circle cx="70" cy="60" r="35" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2" /> <ellipse cx="70" cy="58" rx="22" ry="20" fill="#512da8" opacity="0.85" /> <circle cx="62" cy="54" r="3" fill="#ffc107" opacity="0.7" /> <circle cx="78" cy="50" r="2" fill="#0dcaf0" opacity="0.6" /> <rect x="55" y="92" width="30" height="20" rx="5" fill="#dee2e6" /> <rect x="48" y="80" width="44" height="18" rx="6" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" /> <circle cx="58" cy="89" r="3" fill="#dc3545" /> <circle cx="70" cy="89" r="3" fill="#ffc107" /> <circle cx="82" cy="89" r="3" fill="#198754" /> <line x1="42" y1="75" x2="28" y2="60" stroke="#dee2e6" stroke-width="6" stroke-linecap="round" /> <line x1="98" y1="75" x2="112" y2="60" stroke="#dee2e6" stroke-width="6" stroke-linecap="round" /> <line x1="58" y1="110" x2="52" y2="130" stroke="#dee2e6" stroke-width="6" stroke-linecap="round" /> <line x1="82" y1="110" x2="88" y2="130" stroke="#dee2e6" stroke-width="6" stroke-linecap="round" /> <!-- Antenna --> <line x1="70" y1="25" x2="70" y2="12" stroke="#adb5bd" stroke-width="2" /> <circle cx="70" cy="10" r="4" fill="#dc3545">
       <animate attributename="opacity" values="1;0.3;1" dur="1.5s" repeatcount="indefinite" />
      </circle>
     </svg>
    </div><!-- 404 Title -->
    <h1 id="error-title" class="glitch-text fade-in-up delay-1" style="font-family: 'Space Mono', monospace; font-size: 96px; font-weight: 700; color: #f8f9fa; line-height: 1; margin-bottom: 8px;">404</h1><!-- Error Message -->
    <p id="error-message" class="fade-in-up delay-2" style="font-size: 22px; color: #adb5bd; font-weight: 300; margin-bottom: 16px;">Careful you are not supposed to be here, go to back to a safe zone...</p><!-- Fun Fact -->
    <div class="fade-in-up delay-2 mb-8 h-8 flex items-center justify-center">
     <span id="fun-fact" class="fun-facts" style="font-family: 'Space Mono', monospace; font-size: 13px; color: #673ab7;"></span>
    </div><!-- Countdown Section -->
    <div class="fade-in-up delay-3 mb-6">
     <p id="redirect-text" style="font-size: 15px; color: #adb5bd; margin-bottom: 12px;">Teleporting you back in</p>
     <div class="relative inline-flex items-center justify-center" style="width: 100px; height: 100px;">
      <div class="absolute inset-0 rounded-full" style="border: 3px solid rgba(81,45,168,0.25);"></div>
      <div class="absolute inset-0 rounded-full" style="border: 3px solid #512da8; border-top-color: transparent; border-right-color: transparent;" id="countdown-ring"></div><span id="countdown" class="countdown-num" style="font-family: 'Space Mono', monospace; font-size: 36px; font-weight: 700; color: #f8f9fa;">10</span>
     </div>
     <div class="mt-4 mx-auto" style="max-width: 260px;">
      <div class="progress-track" style="background: rgba(81,45,168,0.2);">
       <div id="progress-bar" class="progress-bar-inner" style="width: 100%; background: linear-gradient(90deg, #512da8, #673ab7);"></div>
      </div>
     </div>
    </div>
<!-- Home Button -->
    <div class="fade-in-up delay-4">
     <button id="home-btn" class="home-btn inline-flex items-center gap-2 px-8 py-3 rounded-full text-white font-semibold" style="background: linear-gradient(135deg, #512da8, #673ab7); font-size: 16px; border: none; cursor: pointer;" onclick="handleGoHome()"> <i data-lucide="home" style="width: 20px; height: 20px;"></i> <span id="btn-text">Take me to the safe zone now!</span> </button>
     <p class="mt-3" style="font-size: 12px; color: #495057;">Or just wait for the magic ✨</p>
    </div>
   </div>
  </div>
  <script>
    // Config
    const defaultConfig = {
      error_title: '404',
      error_message: 'Careful you are not supposed to be here, go to back to a safe zone...',
      redirect_text: 'Teleporting you back in',
      button_text: 'Take me to the safe zone now!',
      background_color: '#212529',
      surface_color: '#f8f9fa',
      text_color: '#adb5bd',
      primary_color: '#512da8',
      secondary_color: '#673ab7'
    };

    // Particles
    const particleColors = ['#512da8', '#673ab7', '#ffc107', '#0dcaf0', '#dc3545'];
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
      p.style.setProperty('--dy', (Math.random() * 200 - 100) + 'px');
      p.style.background = particleColors[i % particleColors.length];
      p.style.animationDelay = (Math.random() * 4) + 's';
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      p.style.width = p.style.height = (4 + Math.random() * 8) + 'px';
      particlesEl.appendChild(p);
    }

    // Fun facts
    const funFacts = [
      '> This page is lost in the matrix...',
      '> 404: Brain cell not found 🧠',
      '> Houston, we have a problem 🚀',
      '> Error: Coffee not found ☕',
      '> The page is playing hide & seek 🙈',
      '> How did you get here? 🎭'
    ];
    document.getElementById('fun-fact').textContent = funFacts[Math.floor(Math.random() * funFacts.length)];

    // Countdown
    let countdown = 10;
    const totalTime = 10;
    const countdownEl = document.getElementById('countdown');
    const progressBar = document.getElementById('progress-bar');
    const ring = document.getElementById('countdown-ring');

    const interval = setInterval(() => {
      countdown--;
      countdownEl.textContent = countdown;
      const pct = (countdown / totalTime) * 100;
      progressBar.style.width = pct + '%';
      const deg = (1 - countdown / totalTime) * 360;
      ring.style.transform = `rotate(${deg}deg)`;
      if (countdown <= 3) {
        countdownEl.style.color = '#dc3545';
      }
      if (countdown <= 0) {
        clearInterval(interval);
        triggerExplosion();
      }
    }, 1000);

    function triggerExplosion() {
      const wrapper = document.getElementById('app-wrapper');
      const countdownContainer = document.querySelector('.relative.inline-flex');
      
      // Add screen flash
      wrapper.classList.add('flash-bg');
      
      // Shake the entire page
      document.querySelector('.relative.z-10').classList.add('shake-on-zero');
      
      // Create explosion particles from countdown center
      const rect = countdownContainer.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const explosionColors = ['#512da8', '#673ab7', '#ffc107', '#0dcaf0', '#dc3545', '#f8f9fa'];
      for (let i = 0; i < 24; i++) {
        const particle = document.createElement('div');
        particle.className = 'explosion-particle';
        particle.style.left = centerX + 'px';
        particle.style.top = centerY + 'px';
        
        const angle = (i / 24) * Math.PI * 2;
        const distance = 120 + Math.random() * 80;
        const ex = Math.cos(angle) * distance;
        const ey = Math.sin(angle) * distance;
        
        particle.style.setProperty('--ex', ex + 'px');
        particle.style.setProperty('--ey', ey + 'px');
        particle.style.width = (8 + Math.random() * 12) + 'px';
        particle.style.height = particle.style.width;
        particle.style.background = explosionColors[Math.floor(Math.random() * explosionColors.length)];
        particle.style.borderRadius = '50%';
        particle.style.boxShadow = `0 0 12px ${particle.style.background}`;
        
        document.body.appendChild(particle);
        
        setTimeout(() => particle.remove(), 800);
      }
      
      // Show home page after explosion
setTimeout(() => {
  document.querySelector('.relative.z-10').innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:72px; margin-bottom:16px;">🏠</div>
      <h2 style="font-family:'Space Mono',monospace; font-size:28px; color:#f8f9fa;">Welcome Home!</h2>
    </div>
  `;

  setTimeout(() => {
    window.location.href = "https://elizabeth.xugarsoft.com/";
  }, 600);

}, 400);
    }

    function handleGoHome() {
      clearInterval(interval);
      triggerExplosion();
    }

    // Element SDK
    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      document.getElementById('error-title').textContent = c.error_title;
      document.getElementById('error-message').textContent = c.error_message;
      document.getElementById('redirect-text').textContent = c.redirect_text;
      document.getElementById('btn-text').textContent = c.button_text;

      const wrapper = document.getElementById('app-wrapper');
      wrapper.style.background = `radial-gradient(ellipse at 30% 20%, ${c.primary_color}40 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, ${c.secondary_color}26 0%, transparent 50%), ${c.background_color}`;

      document.getElementById('error-title').style.color = c.surface_color;
      document.getElementById('error-message').style.color = c.text_color;
      document.getElementById('redirect-text').style.color = c.text_color;
      document.getElementById('home-btn').style.background = `linear-gradient(135deg, ${c.primary_color}, ${c.secondary_color})`;

      progressBar.style.background = `linear-gradient(90deg, ${c.primary_color}, ${c.secondary_color})`;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => applyConfig(config),
        mapToCapabilities: (config) => {
          const c = { ...defaultConfig, ...config };
          const makeColor = (key) => ({
            get: () => c[key],
            set: (v) => { c[key] = v; window.elementSdk.setConfig({ [key]: v }); }
          });
          return {
            recolorables: [
              makeColor('background_color'),
              makeColor('surface_color'),
              makeColor('text_color'),
              makeColor('primary_color'),
              makeColor('secondary_color')
            ],
            borderables: [],
            fontEditable: {
              get: () => c.font_family || 'Outfit',
              set: (v) => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
            },
            fontSizeable: undefined
          };
        },
        mapToEditPanelValues: (config) => {
          const c = { ...defaultConfig, ...config };
          return new Map([
            ['error_title', c.error_title],
            ['error_message', c.error_message],
            ['redirect_text', c.redirect_text],
            ['button_text', c.button_text]
          ]);
        }
      });
    }

    lucide.createIcons();
  </script>
